name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Automatically format code and push it back to the branch
  format_and_fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.auto_commit.outputs.changes_detected }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Run Formatter
        run: dart format .

      - name: Commit and Push Changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] chore: auto-format code"
          file_pattern: '*.dart'

  # JOB 2: Test and Analyze
  build_and_test:
    runs-on: ubuntu-latest
    needs: format_and_fix
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting compliance
        run: |
          dart format --output=none --set-exit-if-changed . || FORMAT_EXIT=$?
          
          if [ "${FORMAT_EXIT:-0}" -ne 0 ]; then
            echo "::warning::Code formatting was applied automatically. Please run 'dart format .' locally before pushing next time to avoid this."
          fi
          
          exit 0

      - name: Generate ObjectBox code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Double check formatting compliance
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test
